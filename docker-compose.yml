services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: healthdrive-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - healthdrive
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: healthdrive-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - healthdrive
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: healthdrive-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-healthdrive}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-healthdrive}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - healthdrive

  redis:
    image: redis:7-alpine
    container_name: healthdrive-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - healthdrive

volumes:
  mysql-data:
  redis-data:

networks:
  healthdrive:
    driver: bridge
